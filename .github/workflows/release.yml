name: Release
on:
  push:
    tags: ["v*"]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:run
      - run: pnpm build
      - name: Package extension
        run: pnpm exec vsce package -o side-bae.vsix
      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: pnpm exec vsce publish --packagePath side-bae.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx ovsx publish side-bae.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: side-bae.vsix
